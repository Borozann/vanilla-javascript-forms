<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Formulário JavaScript</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
        overflow-x: hidden;
      }

      .container {
        width: 100%;
        max-width: 950px;

        background: rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(18px);

        border: 1px solid rgba(255, 255, 255, 0.12);

        border-radius: 30px;

        padding: 35px;

        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        flex-wrap: wrap;
        gap: 15px;
      }

      .title {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .logo {
        width: 60px;
        height: 60px;

        border-radius: 18px;

        background: linear-gradient(135deg, #3b82f6, #06b6d4);

        display: flex;
        justify-content: center;
        align-items: center;

        font-size: 28px;

        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
      }

      .title h1 {
        color: white;
        font-size: 30px;
        font-weight: 700;
      }

      .title p {
        color: #9ca3af;
        margin-top: 4px;
      }

      .status {
        padding: 12px 18px;

        border-radius: 14px;

        background: rgba(16, 185, 129, 0.15);

        color: #34d399;

        border: 1px solid rgba(52, 211, 153, 0.3);

        font-weight: 600;
      }

      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .card {
        position: relative;

        overflow: hidden;

        border-radius: 24px;

        padding: 25px;

        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
      }

      .card::before {
        content: "";

        position: absolute;

        top: -40px;
        right: -40px;

        width: 120px;
        height: 120px;

        border-radius: 50%;

        opacity: 0.15;
      }

      .blue::before {
        background: #3b82f6;
      }

      .cyan::before {
        background: #06b6d4;
      }

      .purple::before {
        background: #a855f7;
      }

      .green::before {
        background: #10b981;
      }

      .card-icon {
        font-size: 30px;
        margin-bottom: 18px;
      }

      .card-title {
        color: #9ca3af;
        font-size: 14px;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .card-value {
        color: white;
        font-size: 24px;
        font-weight: 700;
        word-break: break-word;
      }

      .form-section {
        background: rgba(255, 255, 255, 0.05);

        border: 1px solid rgba(255, 255, 255, 0.08);

        border-radius: 25px;

        padding: 30px;
      }

      .section-title {
        color: white;
        font-size: 22px;
        margin-bottom: 25px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group label {
        display: block;
        margin-bottom: 10px;
        color: #d1d5db;
        font-size: 14px;
        font-weight: 600;
      }

      .input-box {
        position: relative;
      }

      .input-box span {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #9ca3af;
      }

      input {
        width: 100%;
        height: 58px;

        border: none;

        outline: none;

        border-radius: 16px;

        background: rgba(255, 255, 255, 0.07);

        border: 1px solid rgba(255, 255, 255, 0.08);

        padding-left: 50px;

        color: white;

        font-size: 15px;

        transition: 0.3s;
      }

      input::placeholder {
        color: #9ca3af;
      }

      input:focus {
        border: 1px solid #3b82f6;

        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      }

      .button {
        margin-top: 15px;

        width: 100%;
        height: 62px;

        border: none;

        border-radius: 18px;

        background: linear-gradient(135deg, #2563eb, #06b6d4);

        color: white;

        font-size: 17px;
        font-weight: 700;

        cursor: pointer;

        transition: 0.3s;

        box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
      }

      .button:hover {
        transform: translateY(-3px) scale(1.01);

        box-shadow: 0 18px 40px rgba(37, 99, 235, 0.45);
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .title h1 {
          font-size: 24px;
        }

        .container {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div class="title">
          <div class="logo">🌐</div>

          <div>
            <h1>Prova de JavaScript</h1>
          </div>
        </div>
      </div>

      <div class="dashboard">
        <div class="card blue">
          <div class="card-icon">📍</div>

          <div class="card-title">Localização</div>

          <div class="card-value" id="cidade">Carregando...</div>
        </div>

        <div class="card cyan">
          <div class="card-icon">🌤</div>

          <div class="card-title">Temperatura</div>

          <div class="card-value" id="clima">Carregando...</div>
        </div>

        <div class="card purple">
          <div class="card-icon">🌎</div>

          <div class="card-title">IP Público</div>

          <div class="card-value" id="ipPublico">Carregando...</div>
        </div>

        <div class="card green">
          <div class="card-icon">🖥</div>

          <div class="card-title">IP Interno</div>

          <div class="card-value" id="ipInterno">Carregando...</div>
        </div>
      </div>

      <div class="form-section">
        <div class="section-title">Informações do Usuário</div>

        <div class="grid">
          <div class="input-group">
            <label>Alterar Cidade</label>

            <div class="input-box">
              <span>🏙</span>

              <input
                type="text"
                id="cidadeInput"
                placeholder="Ex: Uberlândia"
              />
            </div>
          </div>

          <div class="input-group">
            <label>Telefone</label>

            <div class="input-box">
              <span>📞</span>

              <input
                type="text"
                id="telefone"
                placeholder="(00) 00000-0000"
                oninput="mask(this)"
              />
            </div>
          </div>
        </div>

        <div class="input-group">
          <label>Nome Completo</label>

          <div class="input-box">
            <span>👤</span>

            <input
              type="text"
              id="nome"
              placeholder="Digite seu nome completo"
            />
          </div>
        </div>

        <button class="button" onclick="processarDados()">
          PROCESSAR DADOS
        </button>
      </div>
    </div>

    <script type="module">
      import { maskUtil } from "./src/js/utils/maskUtil.js";
      window.mask = maskUtil.phoneNumber;
      import { Session } from "./src/js/Session.js";

      const mySession = new Session();

      await mySession.start();

      // =========================
      // DADOS DA SESSION
      // =========================

      document.getElementById("cidade").innerText =
        mySession.user.getLocation();

      document.getElementById("clima").innerText =
        mySession.weather.getTemperature() + "°C";

      document.getElementById("ipPublico").innerText = mySession.user.getIp();

      document.getElementById("ipInterno").innerText =
        mySession.user.getIpInterno();

      // =========================
      // ALTERAR CIDADE
      // =========================

      const cidadeInput = document.getElementById("cidadeInput");

      cidadeInput.addEventListener("keydown", function (event) {
        if (event.key === "Tab") {
          event.preventDefault();

          document.getElementById("cidade").innerText = cidadeInput.value;
        }
      });

      // =========================
      // PROCESSAR
      // =========================

      window.processarDados = function () {
        const dados = {
          cidade: document.getElementById("cidade").innerText,

          clima: document.getElementById("clima").innerText,

          ipPublico: document.getElementById("ipPublico").innerText,

          ipInterno: document.getElementById("ipInterno").innerText,

          nome: document.getElementById("nome").value,

          telefone: document.getElementById("telefone").value,
        };
        mySession.user.setNome(dados.nome);
        mySession.user.setTelefone(dados.telefone);
        mySession.mergeLocalStorage();

        console.log("Dados enviados:", mySession);

        alert("Dados processados com sucesso!");
      };
    </script>
  </body>
</html>
